<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">CaseStudy Architecture Overview</title>
  <desc id="desc">Frontend React app calling FastAPI backend, which queries Paris Open Data and PRIM mobility API with caching.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6faff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#5a6f8f" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f4f7f"/>
    </marker>
    <style>
      .title { font: 700 38px 'Segoe UI', Tahoma, sans-serif; fill: #12325d; }
      .subtitle { font: 500 18px 'Segoe UI', Tahoma, sans-serif; fill: #3f5e87; }
      .box-title { font: 700 24px 'Segoe UI', Tahoma, sans-serif; fill: #183b66; }
      .box-text { font: 500 16px 'Segoe UI', Tahoma, sans-serif; fill: #35557f; }
      .tiny { font: 600 14px 'Segoe UI', Tahoma, sans-serif; fill: #274b77; }
    </style>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)"/>

  <text x="70" y="78" class="title">What to Do in Paris - System Architecture</text>
  <text x="70" y="110" class="subtitle">React + FastAPI + External Data APIs + Diskcache</text>

  <rect x="70" y="170" rx="18" ry="18" width="290" height="240" fill="url(#card)" stroke="#bdd2ef" stroke-width="2" filter="url(#shadow)"/>
  <text x="95" y="215" class="box-title">Frontend</text>
  <text x="95" y="248" class="box-text">Vite + React + TypeScript</text>
  <text x="95" y="278" class="box-text">MUI components</text>
  <text x="95" y="308" class="box-text">Search + free filter + paging</text>
  <text x="95" y="338" class="box-text">Runs on :5173</text>

  <rect x="455" y="140" rx="18" ry="18" width="330" height="320" fill="url(#card)" stroke="#9fbbe4" stroke-width="2" filter="url(#shadow)"/>
  <text x="482" y="185" class="box-title">Backend API</text>
  <text x="482" y="218" class="box-text">FastAPI /api/events</text>
  <text x="482" y="248" class="box-text">Repository + Service layers</text>
  <text x="482" y="278" class="box-text">Haversine distance calculation</text>
  <text x="482" y="308" class="box-text">Travel duration enrichment</text>
  <text x="482" y="338" class="box-text">Diskcache event_cache (600s)</text>
  <text x="482" y="368" class="box-text">Runs on :8000</text>

  <rect x="885" y="120" rx="18" ry="18" width="245" height="160" fill="url(#card)" stroke="#bdd2ef" stroke-width="2" filter="url(#shadow)"/>
  <text x="910" y="164" class="box-title">Paris Open Data</text>
  <text x="910" y="194" class="box-text">Events catalog</text>
  <text x="910" y="224" class="box-text">Filtering + pagination</text>

  <rect x="885" y="330" rx="18" ry="18" width="245" height="170" fill="url(#card)" stroke="#bdd2ef" stroke-width="2" filter="url(#shadow)"/>
  <text x="910" y="374" class="box-title">PRIM API</text>
  <text x="910" y="404" class="box-text">Public transit journeys</text>
  <text x="910" y="434" class="box-text">Uses TRAVEL_TIME_TOKEN</text>

  <line x1="360" y1="290" x2="455" y2="290" stroke="#2f4f7f" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="375" y="275" class="tiny">HTTP /api/events</text>

  <line x1="785" y1="235" x2="885" y2="200" stroke="#2f4f7f" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="800" y="190" class="tiny">fetch events</text>

  <line x1="785" y1="340" x2="885" y2="390" stroke="#2f4f7f" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="804" y="358" class="tiny">fetch travel time</text>

  <rect x="455" y="500" rx="14" ry="14" width="675" height="86" fill="#eaf2ff" stroke="#c4d6f3"/>
  <text x="478" y="535" class="box-text">Cache behavior: Backend stores event query results for 10 minutes to reduce external API calls.</text>
  <text x="478" y="565" class="box-text">Key format: events_{limit}_{offset}_{query}_free_{is_free}</text>
</svg>
